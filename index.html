<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAPA-Sarap - Discover Amazing Food</title>
  
  <!-- Styles -->
  <link rel="stylesheet" href="src/css/styles.css">
  
  <!-- Leaflet Map (Free, No API Key) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <!-- HEADER -->
  <header>
    <div class="container">
      <div class="header-content">
        <a href="index.html" class="logo">
          <div class="logo-icon">M</div>
          <span class="logo-text">MapaSarap</span>
        </a>

        <button class="nav-toggle" aria-label="Toggle navigation">☰</button>

        <nav>
          <a href="index.html">Discover</a>
          <a href="src/pages/leaderboard.html">Leaderboard</a>
          <a href="src/pages/favorites.html">Favorites</a>
        </nav>

        <div class="header-actions"></div>
      </div>
    </div>
  </header>

  <!-- HERO SECTION -->
  <section class="hero">
    <img src="https://d2xsxph8kpxj0f.cloudfront.net/310519663567872441/SZpweG627JTbEEmfPVqiqm/hero-home-nq4NFeNs4Y25ey2sZ6LeXg.webp" alt="Hero Banner">
    <div class="hero-overlay">
      <div class="hero-content">
        <h1>Discover Amazing Food</h1>
        <p>Exploring the best flavors within 3km of AUF</p>
      </div>
    </div>
  </section>

  <main>
    <section class="container py-12">
      <div class="mb-6">
        <h2 class="text-2xl">Community Dashboard</h2>
        <p class="text-sm text-muted-foreground">Insights from our local food community</p>
      </div>
      <div class="stats-grid" id="stats-grid"></div>
    </section>

    <section class="container py-8">
      <div class="search-bar">
        <div class="search-input">
          <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
          <input type="text" id="search-input" placeholder="Search restaurants..." autocomplete="off">
        </div>
      </div>

      <div style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem;">
        <button id="grid-view-btn" class="view-toggle-btn active" onclick="switchView('grid')">Grid</button>
        <button id="map-view-btn" class="view-toggle-btn" onclick="switchView('map')">Map</button>
      </div>

      <div class="filter-bar">
        <div style="display: flex; flex-wrap: wrap; gap: 1rem; align-items: center;">
          <!-- Cuisine Filter -->
          <div style="display: flex; flex-direction: column; gap: 0.5rem;">
            <label for="cuisine-filter" style="font-weight: 500; font-size: 0.875rem;">Cuisine</label>
            <select id="cuisine-filter" style="padding: 0.5rem; border: 1px solid var(--border); border-radius: 0.375rem; background: white;">
              <option value="All">All Cuisines</option>
              <option value="Filipino Fast Food">Filipino Fast Food</option>
              <option value="American Fast Food">American Fast Food</option>
              <option value="Korean">Korean</option>
              <option value="Wraps and Rice Meals">Wraps and Rice Meals</option>
            </select>
          </div>

          <!-- Price Range Filter -->
          <div style="display: flex; flex-direction: column; gap: 0.5rem;">
            <label for="price-filter" style="font-weight: 500; font-size: 0.875rem;">Price Range</label>
            <select id="price-filter" style="padding: 0.5rem; border: 1px solid var(--border); border-radius: 0.375rem; background: white;">
              <option value="All">All Prices</option>
              <option value="$">$ (Budget)</option>
              <option value="$$">$$ (Moderate)</option>
              <option value="$$$">$$$ (Premium)</option>
            </select>
          </div>

          <!-- Minimum Rating Filter -->
          <div style="display: flex; flex-direction: column; gap: 0.5rem;">
            <label for="rating-filter" style="font-weight: 500; font-size: 0.875rem;">Min Rating</label>
            <select id="rating-filter" style="padding: 0.5rem; border: 1px solid var(--border); border-radius: 0.375rem; background: white;">
              <option value="0">All Ratings</option>
              <option value="3.0">3.0★ & up</option>
              <option value="3.5">3.5★ & up</option>
              <option value="4.0">4.0★ & up</option>
              <option value="4.5">4.5★ & up</option>
            </select>
          </div>

          <!-- Open Now Filter -->
          <div style="display: flex; align-items: flex-end; gap: 0.5rem; height: 100%;">
            <input type="checkbox" id="open-only-filter" style="width: 1.25rem; height: 1.25rem; cursor: pointer;">
            <label for="open-only-filter" style="font-weight: 500; font-size: 0.875rem; cursor: pointer; user-select: none;">Open Now</label>
          </div>

          <!-- Basis Selector -->
          <div style="display: flex; flex-direction: column; gap: 0.5rem;">
            <label for="basis-filter" style="font-weight: 500; font-size: 0.875rem;">Basis</label>
            <select id="basis-filter" style="padding: 0.5rem; border: 1px solid var(--border); border-radius: 0.375rem; background: white;">
              <option value="all">All Basis Markers</option>
              <option value="auf-main">AUF Main Building</option>
              <option value="auf-ps">AUF PS Building</option>
              <option value="auf-eya">AUF EYA Building</option>
              <option value="auf-scc">AUF SCC</option>
              <option value="live-location">Live Location</option>
            </select>
          </div>
        </div>
      </div>
    </section>

    <section class="container py-8 mb-8" id="grid-section">
      <div class="grid-restaurants" id="restaurants-grid"></div>
    </section>

    <section class="container py-8 mb-8" id="map-section" style="display: none;">
      <div id="map" style="width: 100%; height: 600px; border-radius: 0.75rem; border: 1px solid var(--border);"></div>
    </section>
  </main>

  <!-- MOBILE BOTTOM NAV -->
  <div class="mobile-nav">
    <a href="index.html" class="mobile-nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
      <span>Discover</span>
    </a>
    <a href="src/pages/leaderboard.html" class="mobile-nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10M18 20V4M6 20v-4"></path></svg>
      <span>Best</span>
    </a>
    <a href="src/pages/favorites.html" class="mobile-nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
      <span>Saved</span>
    </a>
  </div>

  <footer>
    <p>&copy; 2024 MAPA-Sarap. All rights reserved.</p>
  </footer>

  <script src="src/js/data.js"></script>
  <script src="src/js/common.js"></script>
  <script>
    let map;
    let restaurantMarkers = [];
    let basisMarkers = [];
    let liveLocationMarker = null;

    const basisLocations = [
      {
        id: 'auf-main',
        name: 'Angeles University Foundation Main Building',
        lat: 15.145032737088446,
        lng: 120.59522415829747,
      },
      {
        id: 'auf-ps',
        name: 'Angeles University Foundation PS Building',
        lat: 15.144975204463575,
        lng: 120.59575271874397,
      },
      {
        id: 'auf-eya',
        name: 'Angeles University Foundation EYA Building',
        lat: 15.144332122804718,
        lng: 120.59599798989409,
      },
      {
        id: 'auf-scc',
        name: 'Angeles University Foundation SCC',
        lat: 15.144448630379697,
        lng: 120.59553933217055,
      },
    ];

    const LIVE_LOCATION_RADIUS_KM = 5;
    window.liveLocationCoordinates = null;
    window.liveLocationRadiusKm = LIVE_LOCATION_RADIUS_KM;

    function getBasisLocationById(basisId) {
      return basisLocations.find((location) => location.id === basisId) || null;
    }

    window.getRestaurantFilterContext = function getRestaurantFilterContext() {
      return {
        radiusKm: LIVE_LOCATION_RADIUS_KM,
        liveLocation: window.liveLocationCoordinates,
        getBasisLocationById,
      };
    };

    const greenMarkerIcon = L.icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
      iconRetinaUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
      shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowSize: [41, 41],
    });

    const defaultMarkerIcon = L.icon({
      iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
      iconRetinaUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png',
      shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowSize: [41, 41],
    });

    function getSelectedBasis() {
      return document.getElementById('basis-filter')?.value || 'all';
    }

    function syncLiveLocationMarkerState() {
      if (!map || !liveLocationMarker) return;

      const isLiveBasis = getSelectedBasis() === 'live-location';
      liveLocationMarker.setIcon(isLiveBasis ? greenMarkerIcon : defaultMarkerIcon);

      if (!map.hasLayer(liveLocationMarker)) {
        liveLocationMarker.addTo(map);
      }
    }

    function createMarker(lat, lng, popupHtml, icon) {
      return L.marker([lat, lng], { icon })
        .bindPopup(popupHtml)
        .addTo(map);
    }

    async function renderStats() {
      const stats = await getStats();
      const statsGrid = document.getElementById('stats-grid');
      if (!statsGrid) return;
      
      statsGrid.innerHTML = `
        <div class="stat-card">
          <div class="stat-value">${stats.totalRestaurants}</div>
          <div class="stat-label">Establishments</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${stats.avgRating}</div>
          <div class="stat-label">Avg Rating</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${stats.totalReviews}</div>
          <div class="stat-label">Total Reviews</div>
        </div>
        <div class="stat-card placeholder">
          <div class="stat-value" style="font-size: 1.25rem;">Pending</div>
          <div class="stat-label">Top Rated Dish</div>
        </div>
        <div class="stat-card placeholder">
          <div class="stat-value" style="font-size: 1.25rem;">TBA</div>
          <div class="stat-label">Active Foodies</div>
        </div>
      `;
    }

    function switchView(view) {
      const gridSection = document.getElementById('grid-section');
      const mapSection = document.getElementById('map-section');
      const gridBtn = document.getElementById('grid-view-btn');
      const mapBtn = document.getElementById('map-view-btn');

      if (view === 'map') {
        gridSection.style.display = 'none';
        mapSection.style.display = 'block';
        gridBtn.classList.remove('active');
        mapBtn.classList.add('active');
        
        if (!map) {
          // Center on AUF area (average of seeded restaurant coordinates)
          map = L.map('map').setView([15.1433, 120.5962], 15);
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
          }).addTo(map);
        }
        updateMapMarkers();
        updateLiveLocationMarker();
      } else {
        gridSection.style.display = 'block';
        mapSection.style.display = 'none';
        gridBtn.classList.add('active');
        mapBtn.classList.remove('active');
      }
    }

    function updateMapMarkers() {
      if (!map) return;
      const selectedBasis = getSelectedBasis();

      restaurantMarkers.forEach(marker => map.removeLayer(marker));
      basisMarkers.forEach(marker => map.removeLayer(marker));
      restaurantMarkers = [];
      basisMarkers = [];

      basisLocations.forEach(location => {
        const popupHtml = `
          <b>${location.name}</b><br>
          <span style="font-size: 0.875rem; color: #666;">
            Basis campus indicator
          </span>
        `;
        const markerIcon = selectedBasis === location.id ? greenMarkerIcon : defaultMarkerIcon;
        const marker = createMarker(location.lat, location.lng, popupHtml, markerIcon);
        basisMarkers.push(marker);
      });

      syncLiveLocationMarkerState();

      const filtered = filterRestaurants();
      filtered.forEach(r => {
        const markerHtml = `
          <b>${r.name}</b><br>
          <span style="font-size: 0.875rem; color: #666;">
            ${r.cuisine}<br>
            ${renderStars(r.rating)} ${r.rating}/5 (${r.reviewCount} reviews)<br>
            ${r.priceRange} • ${r.status}<br>
            <a href="${pagePaths.detailPath}?id=${r.id}" style="color: var(--primary); text-decoration: none;">View Details →</a>
          </span>
        `;
        const marker = L.marker([r.lat, r.lng])
          .bindPopup(markerHtml)
          .addTo(map);
        restaurantMarkers.push(marker);
      });

      // Auto-fit bounds if there are markers
      const fitMarkers = [...basisMarkers, ...restaurantMarkers, ...(liveLocationMarker ? [liveLocationMarker] : [])];
      if (fitMarkers.length > 0) {
        const group = new L.featureGroup(fitMarkers);
        map.fitBounds(group.getBounds().pad(0.1));
      }
    }

    function updateLiveLocationMarker() {
      if (!map || !navigator.geolocation) return;

      navigator.geolocation.getCurrentPosition(
        (position) => {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          window.liveLocationCoordinates = { lat, lng };
          const popupHtml = `
            <b>Your Live Location</b><br>
            <span style="font-size: 0.875rem; color: #666;">
              Current position
            </span>
          `;

          if (liveLocationMarker) {
            liveLocationMarker.setLatLng([lat, lng]);
            liveLocationMarker.setPopupContent(popupHtml);
            syncLiveLocationMarkerState();

            if (isLiveBasis && typeof window.refreshRestaurantResults === 'function') {
              window.refreshRestaurantResults();
            }

            return;
          }

          const isLiveBasis = getSelectedBasis() === 'live-location';
          liveLocationMarker = L.marker([lat, lng], { icon: isLiveBasis ? greenMarkerIcon : defaultMarkerIcon })
            .bindPopup(popupHtml)
            .addTo(map);

          if (isLiveBasis && typeof window.refreshRestaurantResults === 'function') {
            window.refreshRestaurantResults();
          }
        },
        () => {
          // Ignore permission or location errors silently.
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
      );
    }

    document.addEventListener('DOMContentLoaded', async () => {
      await initializeData();
      await renderStats();
      setupFilters();
    });
  </script>
</body>
</html>
