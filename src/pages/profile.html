<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - MAPA-Sarap</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <!-- HEADER -->
  <header>
    <div class="container">
      <div class="header-content">
        <a href="../../index.html" class="logo">
          <div class="logo-icon">M</div>
          <span class="logo-text">MAPA-Sarap</span>
        </a>

        <button class="nav-toggle" aria-label="Toggle navigation">☰</button>

        <nav>
          <a href="../../index.html">Discover</a>
          <a href="leaderboard.html">Leaderboard</a>
          <a href="favorites.html">Favorites</a>
        </nav>

        <div class="header-actions"></div>
      </div>
    </div>
  </header>

  <main>
    <div class="profile-container">
      <div id="profile-content"></div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2024 MAPA-Sarap. All rights reserved.</p>
  </footer>

  <script src="../js/data.js"></script>
  <script src="../js/common.js"></script>
  <script>
    function renderProfile() {
      const user = storage.getUser();
      const profileContent = document.getElementById('profile-content');

      if (!user) {
        profileContent.innerHTML = `
          <div class="empty-state" style="margin-top: 3rem;">
            <div class="empty-state-icon">👤</div>
            <div class="empty-state-title">Not Logged In</div>
            <p class="empty-state-text">Please log in to view your profile.</p>
            <a href="auth/login.html" class="btn btn-primary">Go to Login</a>
          </div>
        `;
        return;
      }

      const favorites = storage.getFavorites();

      profileContent.innerHTML = `
        <div class="profile-header">
          <div class="profile-avatar">${user.name.charAt(0).toUpperCase()}</div>
          <div class="profile-name">${user.name}</div>
          <div class="profile-email">${user.email}</div>
          <button class="btn btn-outline" onclick="logout()">Logout</button>
        </div>

        <div class="profile-section" style="background: var(--card); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 1.5rem;">
          <h3>Account Information</h3>
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
            <div>
              <div style="font-size: 0.75rem; text-transform: uppercase; color: var(--muted-foreground); letter-spacing: 0.05em; margin-bottom: 0.25rem;">Full Name</div>
              <div style="font-weight: 600;">${user.name}</div>
            </div>
            <div>
              <div style="font-size: 0.75rem; text-transform: uppercase; color: var(--muted-foreground); letter-spacing: 0.05em; margin-bottom: 0.25rem;">Email</div>
              <div style="font-weight: 600;">${user.email}</div>
            </div>
            <div>
              <div style="font-size: 0.75rem; text-transform: uppercase; color: var(--muted-foreground); letter-spacing: 0.05em; margin-bottom: 0.25rem;">Member Since</div>
              <div style="font-weight: 600;">${new Date().toLocaleDateString()}</div>
            </div>
          </div>
        </div>

        <div class="profile-section" style="background: var(--card); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 1.5rem;">
          <h3>Activity</h3>
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem;">
            <div>
              <div style="font-size: 0.75rem; text-transform: uppercase; color: var(--muted-foreground); letter-spacing: 0.05em; margin-bottom: 0.25rem;">Favorites</div>
              <div style="font-size: 2rem; font-weight: bold; color: var(--primary);">${favorites.length}</div>
            </div>
            <div>
              <div style="font-size: 0.75rem; text-transform: uppercase; color: var(--muted-foreground); letter-spacing: 0.05em; margin-bottom: 0.25rem;">Reviews</div>
              <div style="font-size: 2rem; font-weight: bold; color: var(--primary);">0</div>
            </div>
          </div>
        </div>

        <div class="profile-section">
          <h3>Preferences</h3>
          <div class="form-group" style="margin-bottom: 0;">
            <label class="filter-checkbox">
              <input type="checkbox" checked disabled>
              <span>Email Notifications</span>
            </label>
          </div>
          <div class="form-group" style="margin-bottom: 0;">
            <label class="filter-checkbox">
              <input type="checkbox" checked disabled>
              <span>Show My Reviews</span>
            </label>
          </div>
        </div>

        <div style="text-align: center; margin-top: 2rem;">
          <button class="btn btn-outline" onclick="logout()">Logout</button>
        </div>
      `;
    }

    document.addEventListener('DOMContentLoaded', renderProfile);
  </script>
</body>
</html>
